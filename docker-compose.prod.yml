services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ezaccess-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      EZACCESS_DATASET_EN: /app/dataset/lieux-en.csv
      EZACCESS_DATASET_FR: /app/dataset/lieux-fr.csv
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  load-balancer:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
